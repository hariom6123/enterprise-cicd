# =============================================================================
# PR Validation — thin caller
#
# Each job delegates to the same reusable workflows used by the main
# ci-cd-pipeline.yml, so behavior stays consistent between PR checks and
# post-merge builds.
# =============================================================================
name: PR Validation

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

concurrency:
  group: pr-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  security-events: write

jobs:
  unit-tests:
    name: 🧪 Unit Tests
    uses: ./.github/workflows/_reusable-unit-tests.yml
    with:
      java-version: ${{ vars.JAVA_VERSION }}

  integration-tests:
    name: 🔗 Integration Tests
    uses: ./.github/workflows/_reusable-integration-tests.yml
    with:
      java-version: ${{ vars.JAVA_VERSION }}

  dependency-scan:
    name: 📚 Dependency Scan
    uses: ./.github/workflows/_reusable-dependency-scan.yml
    with:
      java-version: ${{ vars.JAVA_VERSION }}

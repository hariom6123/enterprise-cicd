name: PR Validation

# Runs only on pull requests — fast feedback loop without paying for
# the full ECR / EKS / Helm deploy pipeline. The full pipeline
# (ci-cd-pipeline.yml) runs on push to main / develop.
on:
  pull_request:
    branches: [main, develop]

# Cancel a previous in-progress run on the same PR when a new commit
# is pushed — keeps the queue short.
concurrency:
  group: pr-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  security-events: write

env:
  JAVA_VERSION: '21'
  MAVEN_OPTS: '-Xmx2g -XX:MaxMetaspaceSize=512m'

jobs:
  unit-tests:
    name: 🧪 Unit Tests
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: ☕ Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'
          cache-dependency-path: 'java-app/pom.xml'

      - name: 🧪 Run Unit Tests
        working-directory: java-app
        run: ./mvnw -B -ntp test -Dtest='*Test,!*IT' -DfailIfNoTests=false

      - name: 📊 Publish Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-surefire-reports
          path: 'java-app/**/target/surefire-reports/*.xml'
          retention-days: 7

  integration-tests:
    name: 🔗 Integration Tests
    runs-on: ubuntu-22.04
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: test
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping"
    steps:
      - uses: actions/checkout@v4

      - name: ☕ Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'
          cache-dependency-path: 'java-app/pom.xml'

      - name: 🔗 Run Integration Tests
        working-directory: java-app
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/testdb
          SPRING_DATASOURCE_USERNAME: test
          SPRING_DATASOURCE_PASSWORD: testpass
          SPRING_REDIS_HOST: localhost
          SPRING_REDIS_PORT: 6379
        run: |
          ./mvnw -B -ntp verify \
            -Dtest='*IT' \
            -DfailIfNoTests=false \
            -Dspring.profiles.active=test

      - name: 📊 Publish IT Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-failsafe-reports
          path: 'java-app/**/target/failsafe-reports/*.xml'
          retention-days: 7

  sonarqube-preview:
    name: 🔬 SonarQube Preview
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: ☕ Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'
          cache-dependency-path: 'java-app/pom.xml'

      # Preview analysis: no quality-gate wait (decisions on PRs need a
      # full push-branch run to be authoritative). Coverage still uploaded
      # for the SonarQube PR decoration.
      - name: 🔬 Run SonarQube Preview
        working-directory: java-app
        uses: sonarsource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.projectKey=spring-boot-app
            -Dsonar.projectName=Spring Boot App
            -Dsonar.java.binaries=target/classes
            -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
            -Dsonar.qualitygate.wait=false

  dependency-scan:
    name: 📚 Dependency Scan (OWASP)
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: ☕ Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'
          cache-dependency-path: 'java-app/pom.xml'

      - name: 🔒 OWASP Dependency Check
        working-directory: java-app
        run: |
          ./mvnw -B -ntp org.owasp:dependency-check-maven:12.1.1:check \
            -DfailBuildOnCVSS=7 \
            -DassemblyAnalyzerEnabled=false

      - name: 📊 Upload Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr-dependency-report
          path: java-app/target/dependency-check-report.html
          retention-days: 14

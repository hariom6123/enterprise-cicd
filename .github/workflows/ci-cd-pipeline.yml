# =============================================================================
# Enterprise CI/CD Pipeline — thin caller
#
# Each job below delegates to a reusable workflow under .github/workflows/_*.
# The shared Slack notification lives in .github/actions/slack-notify.
#
# See workflow.md for the full pipeline documentation.
# =============================================================================
name: Enterprise CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  # MAVEN_OPTS is consumed by mvn inside reusable workflows (job-level env works).
  # The other values were lifted to repo Variables so they can be changed without
  # editing this file — they MUST be set in Settings → Secrets and variables →
  # Actions → Variables (see vars section below).
  MAVEN_OPTS: '-Xmx2g -XX:MaxMetaspaceSize=512m'

# Required repo Variables (Settings → Secrets and variables → Actions → Variables):
#   AWS_ACCOUNT_ID         — 12-digit AWS account id
#   AWS_REGION             — e.g. us-east-1
#   ECR_REPOSITORY         — e.g. spring-boot-app
#   HELM_CHART_PATH        — path to Helm chart, e.g. ./charts/spring-boot-app
#   JAVA_VERSION           — JDK version, e.g. 17
#   DEPLOY_DEV_CLUSTER     — dev EKS cluster name
#   DEPLOY_PROD_CLUSTER    — prod EKS cluster name
#
# vars.* is allowed in the 'with:' block of reusable-workflow calls; env.* is not.

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  id-token: write
  pull-requests: write
  security-events: write

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1: Build (mvn package + docker build, no push)
  # ---------------------------------------------------------------------------
  build:
    uses: ./.github/workflows/_reusable-build.yml
    with:
      java-version: ${{ vars.JAVA_VERSION }}
      ecr-registry: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com
      ecr-repository: ${{ vars.ECR_REPOSITORY }}
      image-tag: ${{ github.sha }}
      aws-region: ${{ vars.AWS_REGION }}
      aws-account-id: ${{ vars.AWS_ACCOUNT_ID }}

  # ---------------------------------------------------------------------------
  # Stage 2: Tests (run in parallel after build)
  # ---------------------------------------------------------------------------
  unit-tests:
    needs: build
    uses: ./.github/workflows/_reusable-unit-tests.yml
    with:
      java-version: ${{ vars.JAVA_VERSION }}

  integration-tests:
    needs: build
    uses: ./.github/workflows/_reusable-integration-tests.yml
    with:
      java-version: ${{ vars.JAVA_VERSION }}

  sonarqube-scan:
    needs: build
    uses: ./.github/workflows/_reusable-sonarqube.yml
    with:
      java-version: ${{ vars.JAVA_VERSION }}
    secrets: inherit

  dependency-scan:
    needs: build
    uses: ./.github/workflows/_reusable-dependency-scan.yml
    with:
      java-version: ${{ vars.JAVA_VERSION }}

  # ---------------------------------------------------------------------------
  # Stage 3: Push image to ECR (push events only, not PRs)
  # ---------------------------------------------------------------------------
  push-to-ecr:
    needs: [build, unit-tests, integration-tests, sonarqube-scan, dependency-scan]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    uses: ./.github/workflows/_reusable-push-ecr.yml
    with:
      ecr-registry: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com
      ecr-repository: ${{ vars.ECR_REPOSITORY }}
      image-tag: ${{ github.sha }}
      aws-region: ${{ vars.AWS_REGION }}
      aws-account-id: ${{ vars.AWS_ACCOUNT_ID }}

  # ---------------------------------------------------------------------------
  # Stage 4: Deploy to Dev EKS
  # ---------------------------------------------------------------------------
  deploy-dev:
    needs: push-to-ecr
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
    uses: ./.github/workflows/_reusable-deploy.yml
    with:
      environment: dev
      ecr-registry: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com
      ecr-repository: ${{ vars.ECR_REPOSITORY }}
      image-tag: ${{ github.sha }}
      aws-region: ${{ vars.AWS_REGION }}
      aws-account-id: ${{ vars.AWS_ACCOUNT_ID }}
      cluster-name: ${{ vars.DEPLOY_DEV_CLUSTER }}
      namespace: spring-boot-app-dev
      values-file: ${{ vars.HELM_CHART_PATH }}/values-dev.yaml
      smoke-test-scheme: http
      timeout-minutes: 10
    secrets: inherit

  # ---------------------------------------------------------------------------
  # Stage 5: Deploy to Prod EKS (manual approval via 'prod' environment)
  # ---------------------------------------------------------------------------
  deploy-prod:
    needs: deploy-dev
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/_reusable-deploy.yml
    with:
      environment: prod
      ecr-registry: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com
      ecr-repository: ${{ vars.ECR_REPOSITORY }}
      image-tag: ${{ github.sha }}
      aws-region: ${{ vars.AWS_REGION }}
      aws-account-id: ${{ vars.AWS_ACCOUNT_ID }}
      cluster-name: ${{ vars.DEPLOY_PROD_CLUSTER }}
      namespace: spring-boot-app-prod
      values-file: ${{ vars.HELM_CHART_PATH }}/values-prod.yaml
      smoke-test-scheme: https
      smoke-test-host: app.example.com
      blue-green: true
      timeout-minutes: 15
      app-url: https://app.example.com
    secrets: inherit

  # ---------------------------------------------------------------------------
  # Stage 6: Rollback validation (only when prod deploy succeeded)
  # ---------------------------------------------------------------------------
  rollback-validation:
    needs: deploy-prod
    if: always() && needs.deploy-prod.result == 'success'
    uses: ./.github/workflows/_reusable-rollback.yml
    with:
      aws-region: ${{ vars.AWS_REGION }}
      aws-account-id: ${{ vars.AWS_ACCOUNT_ID }}
      cluster-name: ${{ vars.DEPLOY_PROD_CLUSTER }}
      namespace: spring-boot-app-prod
      app-url: app.example.com

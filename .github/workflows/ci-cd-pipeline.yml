# =============================================================================
# Enterprise CI/CD Pipeline — thin caller
#
# Each job below delegates to a reusable workflow under .github/workflows/_*.
# The shared Slack notification lives in .github/actions/slack-notify.
#
# See workflow.md for the full pipeline documentation.
# =============================================================================
name: Enterprise CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  JAVA_VERSION: '17'
  MAVEN_OPTS: '-Xmx2g -XX:MaxMetaspaceSize=512m'
  AWS_REGION: 'us-east-1'
  ECR_REPOSITORY: 'spring-boot-app'
  IMAGE_TAG: ${{ github.sha }}
  HELM_CHART_PATH: './charts/spring-boot-app'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  id-token: write
  pull-requests: write
  security-events: write

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1: Build (mvn package + docker build, no push)
  # ---------------------------------------------------------------------------
  build:
    uses: ./.github/workflows/_reusable-build.yml
    with:
      java-version: '17'
      ecr-registry: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
      ecr-repository: spring-boot-app
      image-tag: ${{ github.sha }}
      aws-region: us-east-1
      aws-account-id: ${{ vars.AWS_ACCOUNT_ID }}

  # ---------------------------------------------------------------------------
  # Stage 2: Tests (run in parallel after build)
  # ---------------------------------------------------------------------------
  unit-tests:
    needs: build
    uses: ./.github/workflows/_reusable-unit-tests.yml
    with:
      java-version: '17'

  integration-tests:
    needs: build
    uses: ./.github/workflows/_reusable-integration-tests.yml
    with:
      java-version: '17'

  sonarqube-scan:
    needs: build
    uses: ./.github/workflows/_reusable-sonarqube.yml
    with:
      java-version: '17'
    secrets: inherit

  dependency-scan:
    needs: build
    uses: ./.github/workflows/_reusable-dependency-scan.yml
    with:
      java-version: '17'

  # ---------------------------------------------------------------------------
  # Stage 3: Push image to ECR (push events only, not PRs)
  # ---------------------------------------------------------------------------
  push-to-ecr:
    needs: [build, unit-tests, integration-tests, sonarqube-scan, dependency-scan]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    uses: ./.github/workflows/_reusable-push-ecr.yml
    with:
      ecr-registry: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
      ecr-repository: spring-boot-app
      image-tag: ${{ github.sha }}
      aws-region: us-east-1
      aws-account-id: ${{ vars.AWS_ACCOUNT_ID }}

  # ---------------------------------------------------------------------------
  # Stage 4: Deploy to Dev EKS
  # ---------------------------------------------------------------------------
  deploy-dev:
    needs: push-to-ecr
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
    uses: ./.github/workflows/_reusable-deploy.yml
    with:
      environment: dev
      ecr-registry: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
      ecr-repository: spring-boot-app
      image-tag: ${{ github.sha }}
      aws-region: us-east-1
      aws-account-id: ${{ vars.AWS_ACCOUNT_ID }}
      cluster-name: ${{ vars.DEPLOY_DEV_CLUSTER }}
      namespace: spring-boot-app-dev
      values-file: ./charts/spring-boot-app/values-dev.yaml
      smoke-test-scheme: http
      timeout-minutes: 10
    secrets: inherit

  # ---------------------------------------------------------------------------
  # Stage 5: Deploy to Prod EKS (manual approval via 'prod' environment)
  # ---------------------------------------------------------------------------
  deploy-prod:
    needs: deploy-dev
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/_reusable-deploy.yml
    with:
      environment: prod
      ecr-registry: ${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
      ecr-repository: spring-boot-app
      image-tag: ${{ github.sha }}
      aws-region: us-east-1
      aws-account-id: ${{ vars.AWS_ACCOUNT_ID }}
      cluster-name: ${{ vars.DEPLOY_PROD_CLUSTER }}
      namespace: spring-boot-app-prod
      values-file: ./charts/spring-boot-app/values-prod.yaml
      smoke-test-scheme: https
      smoke-test-host: app.example.com
      blue-green: true
      timeout-minutes: 15
      app-url: https://app.example.com
    secrets: inherit

  # ---------------------------------------------------------------------------
  # Stage 6: Rollback validation (only when prod deploy succeeded)
  # ---------------------------------------------------------------------------
  rollback-validation:
    needs: deploy-prod
    if: always() && needs.deploy-prod.result == 'success'
    uses: ./.github/workflows/_reusable-rollback.yml
    with:
      aws-region: us-east-1
      aws-account-id: ${{ vars.AWS_ACCOUNT_ID }}
      cluster-name: ${{ vars.DEPLOY_PROD_CLUSTER }}
      namespace: spring-boot-app-prod
      app-url: app.example.com

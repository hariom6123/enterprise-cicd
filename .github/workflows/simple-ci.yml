# =============================================================================
# Simple CI — standalone, no deploy.
#
# Stages: build → unit test → security scan → package.
# No ECR push, no Helm, no EKS, no integration tests. Jar is uploaded
# as a build artifact.
#
# Lives alongside the enterprise pipeline (ci-cd-pipeline.yml) and does not
# call any of the reusable workflows, so it can run independently without
# any repo Variables being set.
#
# Integration tests are intentionally out of scope here — they need real
# Postgres + Redis service containers, which the enterprise pipeline
# already covers (see .github/workflows/_reusable-integration-tests.yml).
# Use that workflow when you need IT coverage.
# =============================================================================
name: Simple CI

on:
  push:
    branches: [main, develop, feature/**]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  IMAGE_NAME: spring-boot-app:ci-${{ github.sha }}
  # NVD API key for the Claude Dependency Vulnerability Agent in Stage 5
  # to query https://services.nvd.nist.gov/rest/json/cves/2.0 directly
  # for live CVE lookups on any packages touched by the PR.
  NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

concurrency:
  group: simple-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  # Required by trivy-action when uploading SARIF to the Security tab.
  security-events: write

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1: Build (mvn package + docker build, no push)
  # ---------------------------------------------------------------------------
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          cache-dependency-path: java-app/pom.xml

      - name: Make mvnw executable
        # On Windows checkouts the file lands at 100644 with no execute bit.
        # Ubuntu runners then fail with "Permission denied" on ./mvnw.
        working-directory: java-app
        run: chmod +x ./mvnw

      - name: Build with Maven
        working-directory: java-app
        run: ./mvnw -B -ntp -Drevision=${GITHUB_SHA::7} clean package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (local only, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Stage 2: Unit Tests (in parallel with scan)
  # ---------------------------------------------------------------------------
  unit-tests:
    name: 🧪 Unit Tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          cache-dependency-path: java-app/pom.xml
      - name: Make mvnw executable
        working-directory: java-app
        run: chmod +x ./mvnw
      - name: Run unit tests
        working-directory: java-app
        run: ./mvnw -B -ntp test -Dtest='*Test,!*IT'

  # ---------------------------------------------------------------------------
  # Stage 3: Security scan — Trivy on the locally built image
  # ---------------------------------------------------------------------------
  security-scan:
    name: 🛡️ Trivy Image Scan
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image for scan
        # Trivy scans a daemon-loaded image; we rebuild it here so this job
        # is independent of the build job's runner state.
        uses: docker/setup-buildx-action@v3

      - name: Load image from build job
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}
          cache-from: type=gha

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          # Reads .trivyignore at repo root — see that file for why each
          # entry is there and when it expires.
          trivyignores: .trivyignore

      - name: Upload Trivy scan results to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Print Trivy summary
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          image-ref: ${{ env.IMAGE_NAME }}
          format: 'table'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

  # ---------------------------------------------------------------------------
  # Stage 4: Package — upload the jar as a build artifact
  # ---------------------------------------------------------------------------
  package:
    name: 📦 Package
    needs: [build, unit-tests, security-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          cache-dependency-path: java-app/pom.xml
      - name: Make mvnw executable
        working-directory: java-app
        run: chmod +x ./mvnw

      - name: Build jar (no tests)
        working-directory: java-app
        run: ./mvnw -B -ntp -Drevision=${GITHUB_SHA::7} clean package -DskipTests

      - name: Upload jar as artifact
        uses: actions/upload-artifact@v4
        with:
          name: spring-boot-app-jar
          path: java-app/target/*.jar
          if-no-files-found: error
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Stage 5: Claude PR Review (only on pull_request to main, so push
  # triggers on feature/** don't burn API quota). Runs after package so
  # we don't pay for Claude on a build that already failed.
  # ---------------------------------------------------------------------------
  claude-review:
    name: 🤖 Claude Review
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    needs: [package]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
    outputs:
      # Parsed by the gate-merge job below. Empty when no critical issues.
      critical-found: ${{ steps.gate.outputs.critical-found }}
      review-comment-id: ${{ steps.claude.outputs.comment_id }}
      # Set by the NVD-backed dependency vulnerability agent in Stage 5.
      nvd-block: ${{ steps.gate-nvd.outputs.nvd-block }}

    steps:
      - name: 📥 Checkout PR
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🤖 Run Claude Code review
        id: claude
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # --review flips Claude into PR review mode (reads the diff, no chat).
          # --allowed-tools restricts Claude to read-only ops so it can't
          # accidentally edit files during the review.
          claude_args: |
            --review
            --allowed-tools "Read,Grep,Glob,Bash(git diff:*),Bash(git log:*)"
          # The full review brief. Claude is told to:
          #   - cover 6 areas (code quality, Spring Boot arch, security,
          #     GitHub Actions, performance, maintainability)
          #   - emit 5 structured sections
          #   - end with a parseable `CRITICAL_ISSUES_FOUND:` line so the
          #     gate-merge job below can decide whether to fail the check.
          prompt: |
            You are reviewing pull request #${{ github.event.pull_request.number }}
            (${{ github.event.pull_request.title }}) on
            ${{ github.repository }} as a Staff Software Engineer.

            Analyze:
            - Java code quality
            - Spring Boot architecture
            - Security vulnerabilities
            - GitHub Actions workflows
            - Performance issues
            - Maintainability

            Return your review in EXACTLY this format (markdown):

            ## 1. Critical Issues
            (Blockers — bugs, security holes, broken CI, data loss, anything
            that must be fixed before merge. If none, write "None.")

            ## 2. High Priority Improvements
            (Should-fix-but-not-blocking issues.)

            ## 3. Nice-to-have Improvements
            (Polish / refactor suggestions.)

            ## 4. Deployment Risks
            (Anything that could bite us in production — config drift,
            backward-incompatible changes, missing rollouts, observability
            gaps, secret/permission changes.)

            ## 5. Final Score
            (X.X / 10 — single decimal, brief one-line justification.)

            ---

            CRITICAL_ISSUES_FOUND: no
            (Replace with `CRITICAL_ISSUES_FOUND: yes` if section 1 lists
            any blocking issue. This line MUST be the last line of your
            output and is parsed by CI to decide whether to fail the
            workflow. Do not omit it.)

      - name: 🚦 Detect Critical Issues
        id: gate
        # Grep the captured Claude transcript for the gate marker.
        # The claude-code-action writes the raw output to ${{ steps.claude.outputs.transcript }}
        # but to be defensive we also re-grep the PR comment body.
        run: |
          if echo '${{ steps.claude.outputs.transcript }}' | grep -qE 'CRITICAL_ISSUES_FOUND:\s*yes'; then
            echo "critical-found=true" >> $GITHUB_OUTPUT
            echo "::notice title=Claude Review::Critical Issues detected — workflow will fail."
          else
            echo "critical-found=false" >> $GITHUB_OUTPUT
            echo "::notice title=Claude Review::No critical issues — workflow will pass."
          fi

      - name: 🤖 Agent 1 — Dependency Vulnerability Analyst (NVD)
        id: nvd-enrich
        # Pre-step for the Claude agent below. Extracts every <dependency>
        # line that was added/changed in this PR's java-app/pom.xml, then
        # asks the NVD CVE 2.0 API (authenticated via NVD_API_KEY) for any
        # known CVEs against that CPE keyword. Result is written to
        # nvd-report.txt which the Claude step consumes.
        env:
          NVD_API_KEY: ${{ env.NVD_API_KEY }}
        run: |
          set -euo pipefail
          echo "🤖 Agent 1: Dependency Vulnerability Analyst (NVD)..."

          # 1. Pull the diff of pom.xml from origin/main (or HEAD~1 on push).
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
          else
            BASE="HEAD~1"
          fi
          git fetch --depth=50 origin "$BASE" 2>/dev/null || BASE="HEAD~1"
          POM_DIFF=$(git diff --unified=0 "$BASE"...HEAD -- java-app/pom.xml || true)

          # 2. Extract artifactIds of dependencies that were added (lines
          #    starting with "+" that contain <artifactId>). Fall back to
          #    listing every <artifactId> in the file if the diff is empty.
          PKGS=$(echo "$POM_DIFF" \
                  | grep '^+' \
                  | grep -v '^+++' \
                  | grep -oE '<artifactId>[^<]+</artifactId>' \
                  | sed -E 's|</?artifactId>||g' \
                  | sort -u)
          if [ -z "$PKGS" ]; then
            PKGS=$(grep -oE '<artifactId>[^<]+</artifactId>' java-app/pom.xml \
                    | sed -E 's|</?artifactId>||g' \
                    | sort -u)
          fi

          echo "──────────────────────────────────────────"
          echo "Packages to query NVD for:"
          echo "$PKGS"
          echo "──────────────────────────────────────────"

          # 3. Query NVD for each package. NVD 2.0 API rate-limits:
          #    5 req/30s without a key, 50 req/30s with one. We sleep 1s
          #    between calls to stay well under that.
          : > nvd-report.txt
          echo "# NVD CVE Report — generated $(date -u +%Y-%m-%dT%H:%M:%SZ)"  >> nvd-report.txt
          echo "# PR: #${{ github.event.pull_request.number }} on ${{ github.repository }}" >> nvd-report.txt
          echo ""                                                                 >> nvd-report.txt

          for PKG in $PKGS; do
            echo "  → querying NVD for: $PKG"
            # keywordSearch matches Maven Central CPEs (cpe:2.3:a:group:artifact).
            RESP=$(curl -sS --max-time 15 \
              -H "apiKey: $NVD_API_KEY" \
              "https://services.nvd.nist.gov/rest/json/cves/2.0?keywordSearch=${PKG}&resultsPerPage=5" \
              || echo '{"vulnerabilities":[],"error":"nvd_request_failed"}')

            {
              echo "## Package: $PKG"
              COUNT=$(echo "$RESP" | jq -r '.totalResults // 0')
              echo "CVE count (last ~120 days, keyword match): $COUNT"
              echo "$RESP" \
                | jq -r '.vulnerabilities[]? | "- " + .cve.id + " | " + (.cve.descriptions[] | select(.lang=="en") | .value | .[0:160]) + " | CVSS=" + (([.cve.metrics.cvssMetricV31[0].cvssData.baseScore // .cve.metrics.cvssMetricV30[0].cvssData.baseScore // "n/a"] | tostring))' \
                | head -n 5
              echo ""
            } >> nvd-report.txt
            sleep 1
          done

          echo ""
          echo "──────────────────────────────────────────"
          echo "🤖 Agent 1 — NVD CVE Report (preview)"
          echo "──────────────────────────────────────────"
          cat nvd-report.txt
          echo "──────────────────────────────────────────"

      - name: 🧠 Claude NVD Triage Agent
        id: claude-nvd
        # Reads nvd-report.txt and produces a prioritized, human-readable
        # risk summary with fix advice. Read-only — same allowed-tools as
        # the main review agent.
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --review
            --allowed-tools "Read,Grep,Glob,Bash(git diff:*),Bash(git log:*)"
          prompt: |
            You are triaging a live NVD CVE report for pull request
            #${{ github.event.pull_request.number }} on
            ${{ github.repository }}. The NVD report was just fetched
            by an upstream agent and is at nvd-report.txt at the repo root.

            Read nvd-report.txt, then produce a markdown summary with
            EXACTLY these sections:

            ## 1. Vulnerable Packages Found
            For each package with CVEs, list:
            - **Package** (groupId:artifactId if visible in the diff)
            - **CVE IDs** (comma-separated)
            - **Highest CVSS score** (numeric)
            - **Recommended upgrade version** (your best judgment from the
              CVE description; if unclear, say "investigate — no fixed
              version identified")
            - **Severity bucket**: CRITICAL / HIGH / MEDIUM / LOW

            If the report shows zero CVEs, write "None — NVD returned no
            matches for the changed packages."

            ## 2. Authentication / Data-Handling Impact
            For each finding, flag whether it could affect authentication,
            session handling, data encryption, or API security in a Spring
            Boot application. Use ⚠️ for yes, — for no.

            ## 3. Overall Dependency Risk Score
            Single number 0–10 (one decimal) with a one-line justification.

            ## 4. Recommended Action
            One of:
            - "Safe to merge — no vulnerable dependencies."
            - "Merge with follow-up issue: <one-line summary>."
            - "Block merge — <one-line summary>."

            End the response with EXACTLY this line on its own line:
            NVD_BLOCK_MERGE: yes
            or
            NVD_BLOCK_MERGE: no

            Use `yes` if section 4 says "Block merge" OR if any package
            is CRITICAL severity. This line is parsed by the gate-merge
            job to fail the workflow.

      - name: 🚦 Detect NVD Block
        id: gate-nvd
        run: |
          if echo '${{ steps.claude-nvd.outputs.transcript }}' | grep -qE 'NVD_BLOCK_MERGE:\s*yes'; then
            echo "nvd-block=true" >> $GITHUB_OUTPUT
            echo "::notice title=Claude NVD::NVD-flagged dependency risk — workflow will fail."
          else
            echo "nvd-block=false" >> $GITHUB_OUTPUT
            echo "::notice title=Claude NVD::No NVD-flagged blockers — workflow will pass."
          fi

  # ---------------------------------------------------------------------------
  # Stage 6: Critical-Issue Gate. Fails the check when the review above
  # reports blocking issues. This is the job branch protection should
  # require on main.
  # ---------------------------------------------------------------------------
  gate-merge:
    name: 🚦 Critical-Issue Gate
    needs: claude-review
    runs-on: ubuntu-latest
    if: always() && needs.claude-review.result == 'success' && github.event_name == 'pull_request' && github.base_ref == 'main'
    steps:
      - name: 🚪 Enforce no-critical-issues policy
        env:
          CRITICAL: ${{ needs.claude-review.outputs.critical-found }}
          NVD_BLOCK: ${{ needs.claude-review.outputs.nvd-block }}
        run: |
          echo "Code-review critical-found=$CRITICAL"
          echo "NVD-dependency block=$NVD_BLOCK"
          FAILED=0
          if [ "$CRITICAL" = "true" ]; then
            echo "::error::Critical Issues found by Claude PR Review. See the 🤖 Claude Review comment on this PR for details."
            FAILED=1
          fi
          if [ "$NVD_BLOCK" = "true" ]; then
            echo "::error::Vulnerable dependencies found by Agent 1 (NVD). See the 🤖 Agent 1 comment on this PR for details."
            FAILED=1
          fi
          if [ "$FAILED" = "1" ]; then
            exit 1
          fi
          echo "✅ No critical issues — review passed."

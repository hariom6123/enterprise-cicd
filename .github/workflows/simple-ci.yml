# =============================================================================
# Simple CI — standalone, no deploy.
#
# Stages: build → unit test → security scan → package.
# No ECR push, no Helm, no EKS, no integration tests. Jar is uploaded
# as a build artifact.
#
# Lives alongside the enterprise pipeline (ci-cd-pipeline.yml) and does not
# call any of the reusable workflows, so it can run independently without
# any repo Variables being set.
#
# Integration tests are intentionally out of scope here — they need real
# Postgres + Redis service containers, which the enterprise pipeline
# already covers (see .github/workflows/_reusable-integration-tests.yml).
# Use that workflow when you need IT coverage.
# =============================================================================
name: Simple CI

on:
  push:
    branches: [main, develop, feature/**]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  IMAGE_NAME: spring-boot-app:ci-${{ github.sha }}
  # NVD API key for the Claude Dependency Vulnerability Agent in Stage 5
  # to query https://services.nvd.nist.gov/rest/json/cves/2.0 directly
  # for live CVE lookups on any packages touched by the PR.
  NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

concurrency:
  group: simple-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  # Required by trivy-action when uploading SARIF to the Security tab.
  security-events: write

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1: Build (mvn package + docker build, no push)
  # ---------------------------------------------------------------------------
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          cache-dependency-path: java-app/pom.xml

      - name: Make mvnw executable
        # On Windows checkouts the file lands at 100644 with no execute bit.
        # Ubuntu runners then fail with "Permission denied" on ./mvnw.
        working-directory: java-app
        run: chmod +x ./mvnw

      - name: Build with Maven
        working-directory: java-app
        run: ./mvnw -B -ntp -Drevision=${GITHUB_SHA::7} clean package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (local only, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Stage 2: Unit Tests (in parallel with scan)
  # ---------------------------------------------------------------------------
  unit-tests:
    name: 🧪 Unit Tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          cache-dependency-path: java-app/pom.xml
      - name: Make mvnw executable
        working-directory: java-app
        run: chmod +x ./mvnw
      - name: Run unit tests
        working-directory: java-app
        run: ./mvnw -B -ntp test -Dtest='*Test,!*IT'

  # ---------------------------------------------------------------------------
  # Stage 3: Security scan — Trivy on the locally built image
  # ---------------------------------------------------------------------------
  security-scan:
    name: 🛡️ Trivy Image Scan
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image for scan
        # Trivy scans a daemon-loaded image; we rebuild it here so this job
        # is independent of the build job's runner state.
        uses: docker/setup-buildx-action@v3

      - name: Load image from build job
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}
          cache-from: type=gha

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          # Reads .trivyignore at repo root — see that file for why each
          # entry is there and when it expires.
          trivyignores: .trivyignore

      - name: Upload Trivy scan results to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Print Trivy summary
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          image-ref: ${{ env.IMAGE_NAME }}
          format: 'table'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

  # ---------------------------------------------------------------------------
  # Stage 4: Package — upload the jar as a build artifact
  # ---------------------------------------------------------------------------
  package:
    name: 📦 Package
    needs: [build, unit-tests, security-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          cache-dependency-path: java-app/pom.xml
      - name: Make mvnw executable
        working-directory: java-app
        run: chmod +x ./mvnw

      - name: Build jar (no tests)
        working-directory: java-app
        run: ./mvnw -B -ntp -Drevision=${GITHUB_SHA::7} clean package -DskipTests

      - name: Upload jar as artifact
        uses: actions/upload-artifact@v4
        with:
          name: spring-boot-app-jar
          path: java-app/target/*.jar
          if-no-files-found: error
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Stage 5: AI Dependency Vulnerability Analysis
  # ---------------------------------------------------------------------------
  dependency-ai-review:
    name: 🤖 AI Dependency Vulnerability Review
    needs: package
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Agent 1 - Dependency Vulnerability Analyst (Java Spring Boot)
        env:
          NVDAI_API_KEY: ${{ secrets.NVDAI_API_KEY }}
        run: |
          set -euo pipefail

          echo "🤖 Running Agent 1: Dependency Vulnerability Analyst..."

          if [ -z "${NVDAI_API_KEY:-}" ]; then
            echo "::error::Repository secret NVDAI_API_KEY is missing."
            exit 1
          fi

          REPORT=$(cat java-app/pom.xml)

          PROMPT=$(cat <<EOF
          You are a Senior Java Spring Boot Security Engineer.

          Analyze the following Maven pom.xml dependencies.

          Return your response in EXACTLY this format.

          --------------------------------------------------

          🤖 Agent 1 - Dependency Vulnerability Analysis

          --------------------------------------------------

          ## Dependency Analysis

          ### CRITICAL
          - List vulnerable dependencies or write "None"

          ### HIGH
          - List vulnerable dependencies or write "None"

          ### MEDIUM
          - List vulnerable dependencies or write "None"

          ### LOW
          - List vulnerable dependencies or write "None"

          ## Recommended Upgrades

          For every vulnerable dependency provide:

          - Current Version
          - Recommended Version
          - Reason for upgrade

          ## Authentication / API Security Impact

          Mention whether any dependency affects:

          - Spring Security
          - Authentication
          - JWT
          - OAuth2
          - Database Connectivity
          - REST API Security
          - Serialization

          ## Overall Dependency Risk Score

          Provide a score out of 10.

          ## Final Recommendation

          If everything is safe write:

          No critical dependency vulnerabilities detected.

          Otherwise provide concise remediation steps.

          Here is the pom.xml:

          $REPORT
          EOF
          )

          PAYLOAD=$(jq -n \
            --arg prompt "$PROMPT" \
            '{
              "model": "meta/llama-3.1-70b-instruct",
              "max_tokens": 1024,
              "temperature": 0.2,
              "messages": [
                {
                  "role": "user",
                  "content": $prompt
                }
              ]
            }')

          HTTP_CODE=$(curl -s \
            -o response.json \
            -w "%{http_code}" \
            https://integrate.api.nvidia.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $NVDAI_API_KEY" \
            -d "$PAYLOAD")

          echo "HTTP Status: $HTTP_CODE"

          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::NVIDIA API request failed."

            echo "===================="
            echo "Response from API"
            echo "===================="

            cat response.json

            exit 1
          fi

          REPORT_OUTPUT=$(jq -r '.choices[0].message.content // "No response returned."' response.json)

          echo "$REPORT_OUTPUT" > dependency-analysis-report.md

          echo ""
          echo "──────────────────────────────────────────"
          echo "🤖 Agent 1 - Dependency Vulnerability Analysis"
          echo "──────────────────────────────────────────"
          cat dependency-analysis-report.md

          {
            echo "# 🤖 AI Dependency Vulnerability Report"
            echo ""
            cat dependency-analysis-report.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Dependency Analysis Report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-analysis-report
          path: dependency-analysis-report.md

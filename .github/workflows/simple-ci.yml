# =============================================================================
# Simple CI — standalone, no deploy.
#
# Stages: build → unit test → security scan → package.
# No ECR push, no Helm, no EKS, no integration tests. Jar is uploaded
# as a build artifact.
#
# Lives alongside the enterprise pipeline (ci-cd-pipeline.yml) and does not
# call any of the reusable workflows, so it can run independently without
# any repo Variables being set.
#
# Integration tests are intentionally out of scope here — they need real
# Postgres + Redis service containers, which the enterprise pipeline
# already covers (see .github/workflows/_reusable-integration-tests.yml).
# Use that workflow when you need IT coverage.
# =============================================================================
name: Simple CI

on:
  push:
    branches: [main, develop, feature/**]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  IMAGE_NAME: spring-boot-app:ci-${{ github.sha }}

concurrency:
  group: simple-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  # Required by trivy-action when uploading SARIF to the Security tab.
  security-events: write

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1: Build (mvn package + docker build, no push)
  # ---------------------------------------------------------------------------
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          cache-dependency-path: java-app/pom.xml

      - name: Make mvnw executable
        # On Windows checkouts the file lands at 100644 with no execute bit.
        # Ubuntu runners then fail with "Permission denied" on ./mvnw.
        working-directory: java-app
        run: chmod +x ./mvnw

      - name: Build with Maven
        working-directory: java-app
        run: ./mvnw -B -ntp -Drevision=${GITHUB_SHA::7} clean package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (local only, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Stage 2: Unit Tests (in parallel with scan)
  # ---------------------------------------------------------------------------
  unit-tests:
    name: 🧪 Unit Tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          cache-dependency-path: java-app/pom.xml
      - name: Make mvnw executable
        working-directory: java-app
        run: chmod +x ./mvnw
      - name: Run unit tests
        working-directory: java-app
        run: ./mvnw -B -ntp test -Dtest='*Test,!*IT'

  # ---------------------------------------------------------------------------
  # Stage 3: Security scan — Trivy on the locally built image
  # ---------------------------------------------------------------------------
  security-scan:
    name: 🛡️ Trivy Image Scan
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image for scan
        # Trivy scans a daemon-loaded image; we rebuild it here so this job
        # is independent of the build job's runner state.
        uses: docker/setup-buildx-action@v3

      - name: Load image from build job
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}
          cache-from: type=gha

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          # Reads .trivyignore at repo root — see that file for why each
          # entry is there and when it expires.
          trivyignores: .trivyignore

      - name: Upload Trivy scan results to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Print Trivy summary
        uses: aquasecurity/trivy-action@master
        if: always()
        with:
          image-ref: ${{ env.IMAGE_NAME }}
          format: 'table'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

  # ---------------------------------------------------------------------------
  # Stage 4: Package — upload the jar as a build artifact
  # ---------------------------------------------------------------------------
  package:
    name: 📦 Package
    needs: [build, unit-tests, security-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          cache-dependency-path: java-app/pom.xml
      - name: Make mvnw executable
        working-directory: java-app
        run: chmod +x ./mvnw

      - name: Build jar (no tests)
        working-directory: java-app
        run: ./mvnw -B -ntp -Drevision=${GITHUB_SHA::7} clean package -DskipTests

      - name: Upload jar as artifact
        uses: actions/upload-artifact@v4
        with:
          name: spring-boot-app-jar
          path: java-app/target/*.jar
          if-no-files-found: error
          retention-days: 14
# =============================================================================
# Simple CI — standalone, no deploy.
#
# Stages: build → test → security scan → package.
# No ECR push, no Helm, no EKS. Jar is uploaded as a build artifact.
# Lives alongside the enterprise pipeline (ci-cd-pipeline.yml) and does not
# call any of the reusable workflows, so it can run independently without
# any repo Variables being set.
# =============================================================================
name: Simple CI

on:
  push:
    branches: [main, develop, feature/**]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  IMAGE_NAME: spring-boot-app:ci-${{ github.sha }}

concurrency:
  group: simple-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  # Required by trivy-action when uploading SARIF to the Security tab.
  security-events: write

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1: Build (mvn package + docker build, no push)
  # ---------------------------------------------------------------------------
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          cache-dependency-path: java-app/pom.xml

      - name: Make mvnw executable
        # On Windows checkouts the file lands at 100644 with no execute bit.
        # Ubuntu runners then fail with "Permission denied" on ./mvnw.
        working-directory: java-app
        run: chmod +x ./mvnw

      - name: Build with Maven
        working-directory: java-app
        run: ./mvnw -B -ntp -Drevision=${GITHUB_SHA::7} clean package -DskipTests

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (local only, no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Stage 2: Tests (unit + integration, in parallel with scan)
  # ---------------------------------------------------------------------------
  unit-tests:
    name: 🧪 Unit Tests
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          cache-dependency-path: java-app/pom.xml
      - name: Make mvnw executable
        working-directory: java-app
        run: chmod +x ./mvnw
      - name: Run unit tests
        working-directory: java-app
        run: ./mvnw -B -ntp test -Dtest='*Test,!*IT'

  integration-tests:
    name: 🔗 Integration Tests
    needs: build
    runs-on: ubuntu-latest
    # Service containers — same as the reusable IT workflow so behavior matches.
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: testdb
          POSTGRES_USER: test
          POSTGRES_PASSWORD: testpass
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping"
    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/testdb
      SPRING_DATASOURCE_USERNAME: test
      SPRING_DATASOURCE_PASSWORD: testpass
      SPRING_REDIS_HOST: localhost
      SPRING_REDIS_PORT: '6379'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          cache-dependency-path: java-app/pom.xml
      - name: Make mvnw executable
        working-directory: java-app
        run: chmod +x ./mvnw
      - name: Run integration tests
        working-directory: java-app
        run: ./mvnw -B -ntp verify -Dtest='*IT' -DfailIfNoTests=false

      - name: Publish IT results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failsafe-reports
          path: java-app/target/failsafe-reports/*.xml
          if-no-files-found: warn
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Stage 3: Security scan — Trivy on the locally built image
  # ---------------------------------------------------------------------------
  security-scan:
    name: 🛡️ Trivy Image Scan
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image for scan
        # Trivy scans a daemon-loaded image; we rebuild it here so this job
        # is independent of the build job's runner state.
        uses: docker/setup-buildx-action@v3

      - name: Load image from build job
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}
          cache-from: type=gha

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true
          # Reads .trivyignore at repo root — see that file for why each
          # entry is there and when it expires.
          ignorefile: .trivyignore

      - name: Upload Trivy scan results to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Print Trivy summary
        uses: aquasecurity/trivy-action@0.28.0
        if: always()
        with:
          image-ref: ${{ env.IMAGE_NAME }}
          format: 'table'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

  # ---------------------------------------------------------------------------
  # Stage 4: Package — upload the jar as a build artifact
  # ---------------------------------------------------------------------------
  package:
    name: 📦 Package
    needs: [build, unit-tests, integration-tests, security-scan]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          cache-dependency-path: java-app/pom.xml
      - name: Make mvnw executable
        working-directory: java-app
        run: chmod +x ./mvnw

      - name: Build jar (no tests)
        working-directory: java-app
        run: ./mvnw -B -ntp -Drevision=${GITHUB_SHA::7} clean package -DskipTests

      - name: Upload jar as artifact
        uses: actions/upload-artifact@v4
        with:
          name: spring-boot-app-jar
          path: java-app/target/*.jar
          if-no-files-found: error
          retention-days: 14

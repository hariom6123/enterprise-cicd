name: Reusable — Build & Package

# Internal reusable workflow — do not trigger directly. Callers use
#   jobs:
#     build:
#       uses: ./.github/workflows/_reusable-build.yml
#       with: { java-version: '17' }

on:
  workflow_call:
    inputs:
      java-version:
        description: 'JDK version to install.'
        type: string
        default: '17'
      ecr-registry:
        description: 'Full ECR registry URL (incl. AWS account + region).'
        type: string
        required: true
      ecr-repository:
        description: 'ECR repository name.'
        type: string
        required: true
      image-tag:
        description: 'Image tag (typically github.sha).'
        type: string
        required: true
      aws-region:
        description: 'AWS region.'
        type: string
        required: true
      aws-account-id:
        description: 'AWS account id (used to build the OIDC role ARN).'
        type: string
        required: true
    outputs:
      image_uri:
        description: 'Full image URI after build (not pushed).'
        value: ${{ jobs.build.outputs.image_uri }}
      jar_artifact:
        description: 'Path to the built Spring Boot fat jar.'
        value: ${{ jobs.build.outputs.jar_artifact }}

jobs:
  build:
    name: 🏗️ Build & Package
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    outputs:
      image_uri: ${{ steps.build-image.outputs.image_uri }}
      jar_artifact: ${{ steps.maven-build.outputs.jar_artifact }}

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - name: ☕ Setup Java ${{ inputs.java-version }} (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ inputs.java-version }}
          cache: 'maven'
          cache-dependency-path: '**/pom.xml'
          gpg-import-public-keys: ${{ secrets.GPG_PUBLIC_KEY }}

      - name: 🔍 Detect Build Tools
        run: |
          echo "JAVA_HOME=$JAVA_HOME"
          java -version
          mvn -version

      - name: 🏗️ Maven Build (skip tests)
        id: maven-build
        run: |
          mvn -B -V \
            -ntp \
            -DskipTests \
            -Dmaven.javadoc.skip=true \
            -Drevision=${GITHUB_SHA::7} \
            clean package

          JAR_FILE=$(ls target/*.jar | grep -v 'original-' | head -1)
          echo "jar_artifact=$JAR_FILE" >> $GITHUB_OUTPUT

          if [ ! -f "$JAR_FILE" ]; then
            echo "❌ JAR file not found"; exit 1
          fi
          echo "✅ Built: $JAR_FILE ($(du -h $JAR_FILE | cut -f1))"

      - name: 📦 Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: spring-boot-jar
          path: target/*.jar
          retention-days: 30
          if-no-files-found: error

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:v0.13.0
            network=host

      - name: 🔐 Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ inputs.aws-account-id }}:role/github-actions-eks-deploy
          role-session-name: github-actions-${{ github.run_id }}
          aws-region: ${{ inputs.aws-region }}
          mask-aws-account-id: false

      - name: 🔑 Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: 🐳 Build & Cache Docker Image
        id: build-image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: |
            ${{ inputs.ecr-registry }}/${{ inputs.ecr-repository }}:${{ inputs.image-tag }}
            ${{ inputs.ecr-registry }}/${{ inputs.ecr-repository }}:latest
          cache-from: type=gha,scope=build-cache
          cache-to: type=gha,scope=build-cache,mode=max
          provenance: true
          sbom: true
          build-args: |
            BUILDKIT_INLINE_CACHE=1
            JAR_FILE=${{ steps.maven-build.outputs.jar_artifact }}

      - name: 🛡️ Scan Image with Trivy (Pre-push)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: ${{ inputs.ecr-registry }}/${{ inputs.ecr-repository }}:${{ inputs.image-tag }}
          format: 'sarif'
          output: 'trivy-image-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
        continue-on-error: true

      - name: 📊 Upload Trivy SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-image-results.sarif'
          category: trivy-image

      - name: 📤 Publish Build Info
        run: |
          echo "::notice::✅ Build complete - Image: ${{ inputs.ecr-registry }}/${{ inputs.ecr-repository }}:${{ inputs.image-tag }}"

# Production environment overrides
replicaCount: 5

autoscaling:
  minReplicas: 5
  maxReplicas: 20
  targetCPUUtilizationPercentage: 60

resources:
  requests:
    cpu: 1000m
    memory: 2Gi
  limits:
    cpu: 4000m
    memory: 4Gi

configMap:
  data:
    SPRING_PROFILES_ACTIVE: "production"
    LOGGING_LEVEL_ROOT: "WARN"
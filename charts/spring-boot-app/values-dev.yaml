# Dev environment overrides
replicaCount: 2

ingress:
  className: alb
  hosts:
    - host: dev-app.example.com
      paths:
        - path: /
          pathType: Prefix

autoscaling:
  enabled: false  # Disabled in dev to save costs

resources:
  requests:
    cpu: 250m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi

configMap:
  data:
    SPRING_PROFILES_ACTIVE: "dev"
    LOGGING_LEVEL_ROOT: "DEBUG"
# =============================================================================
# Base application configuration.
# Profile-specific overrides live in application-{profile}.properties.
# =============================================================================

spring.application.name=spring-boot-app

# -----------------------------------------------------------------------------
# Actuator: exposed on the base path /actuator. The pipeline's smoke tests hit
# /actuator/health, /actuator/health/liveness, /actuator/health/readiness,
# and /actuator/info — all of those are enabled here.
# -----------------------------------------------------------------------------
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when-authorized
management.info.env.enabled=true
info.app.name=${spring.application.name}
info.app.description=Enterprise Spring Boot application
# build.version is set by Maven filtering (pom.xml) → exposes the ${revision}
# that the pipeline passes as -Drevision=${GITHUB_SHA::7}.
info.app.version=@project.version@

# Flyway-style validate: the schema is owned by Spring Boot's
# schema.sql / Flyway / DBA, not by Hibernate. ddl-auto=validate keeps Hibernate
# from silently mutating production tables.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# =============================================================================
# Test profile — used by the pipeline's integration-tests job:
#   mvn verify -Dtest='*IT' -Dspring.profiles.active=test
#
# Defaults: H2 in-memory + embedded Redis stub. If the pipeline's IT job sets
# SPRING_DATASOURCE_URL / SPRING_REDIS_HOST env vars (Postgres + real Redis
# service containers), those override these defaults.
# =============================================================================

# Default to H2 in-memory. The pipeline's IT job overrides SPRING_DATASOURCE_URL
# with the real postgres:16-alpine connection string.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
# Driver and dialect are intentionally not pinned — Spring Boot / Hibernate
# auto-detect both from the JDBC URL (jdbc:postgresql: → PostgreSQL driver +
# PostgreSQLDialect, jdbc:h2: → H2 driver + H2Dialect). This matches the
# recommended approach (HHH90000025) and avoids the previous bug where
# org.h2.Driver was hard-coded and broke the IT job once SPRING_DATASOURCE_URL
# was overridden to a postgres:// URL.

spring.jpa.hibernate.ddl-auto=create-drop

# Default to a no-op Redis host; integration tests that exercise the counter
# can override with @TestPropertySource or SPRING_REDIS_HOST=localhost
# (the pipeline's IT service container is reachable on localhost).
spring.data.redis.host=${SPRING_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_REDIS_PORT:6379}

# Make sure the context starts cleanly during ITs
spring.main.banner-mode=off

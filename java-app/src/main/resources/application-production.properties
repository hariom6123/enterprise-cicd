# =============================================================================
# Production profile — used by the Dockerfile (ENV SPRING_PROFILES_ACTIVE=production).
#
# All infra connection details come from environment variables. The pipeline
# passes the same variables into the Kubernetes manifests (see values-prod.yaml).
#
# Note: spring.jpa.hibernate.ddl-auto=validate lives in application.properties
# so it's the single source of truth for the production schema-validation rule.
# =============================================================================

# PostgreSQL — provided by the EKS deployment via env vars
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool (HikariCP defaults are fine; tune here if needed)
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# JPA dialect — Hibernate 6 auto-detects from the JDBC driver, but explicit is
# clearer than implicit when the prod vs test databases differ.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# Redis — provided by the EKS deployment via env vars
spring.data.redis.host=${SPRING_REDIS_HOST}
spring.data.redis.port=${SPRING_REDIS_PORT:6379}
spring.data.redis.timeout=2000ms
